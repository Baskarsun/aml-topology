# nginx reverse-proxy with TLS termination for the AML Inference API
#
# Usage:
#   1. Obtain a certificate (Let's Encrypt: certbot, or self-signed for dev):
#        openssl req -x509 -newkey rsa:4096 -keyout aml.key -out aml.crt \
#                -days 365 -nodes -subj "/CN=aml-api"
#   2. Copy this file to /etc/nginx/sites-available/aml-api
#   3. ln -s /etc/nginx/sites-available/aml-api /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

upstream aml_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name your-aml-api-host.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-aml-api-host.example.com;

    # --- TLS certificates ---
    ssl_certificate     /etc/ssl/certs/aml.crt;
    ssl_certificate_key /etc/ssl/private/aml.key;

    # --- TLS hardening ---
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;

    # --- Proxy to Flask ---
    location / {
        proxy_pass         http://aml_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Body size limit — prevents oversized batch payloads
        client_max_body_size 10M;
    }
}
